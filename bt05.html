<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bản đồ thông tin điện tử</title>
    <style>
        /* Căn giữa bản đồ cho đẹp mắt */
        body {
            text-align: center;
            background-color: #f4f4f4;
            padding-top: 20px;
        }
        img {
            max-width: 100%;
            height: auto;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <h2>Bản đồ Cổng thông tin điện tử Việt Nam</h2>
    <p>Di chuột và click vào vị trí các thành phố trên bản đồ để truy cập</p>
   
    <img src="Ban-do.png" usemap="#image-map" alt="Bản đồ Việt Nam">

    <map name="image-map">
        <area target="_blank" alt="Cổng thông tin điện tử Hà Nội" title="Cổng thông tin điện tử Hà Nội" href="https://hanoi.gov.vn/" coords="251,190,13" shape="circle">
        
        <area target="_blank" alt="Cổng thông tin điện tử Huế" title="Cổng thông tin điện tử Huế" href="https://hue.gov.vn/" coords="342,464,310,488,344,510,390,501" shape="poly">
        
        <area target="_blank" alt="Cổng thông tin điện tử Thành phố Hồ Chí Minh" title="Cổng thông tin điện tử Thành phố Hồ Chí Minh" href="https://hochiminhcity.gov.vn/" coords="279,809,318,854" shape="rect">
    </map>

</body>
</html>
